services:
  postgres:
    image: postgres:18-alpine
    container_name: test_pulse_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=test_pulse_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d test_pulse_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "5432:5432"
    restart: unless-stopped
